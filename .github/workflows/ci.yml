name: CI 自动测试

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 下载代码
      uses: actions/checkout@v3
    
    - name: 🟢 安装 Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: 📦 安装依赖
      run: npm install
    
    - name: 🧪 运行测试
      run: npm test
    
    - name: ✅ 测试通过
      if: success()
      run: echo "所有测试通过！"
